services:
  postgres:
    image: postgres:17
    container_name: assetflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assetflow
    ports:
      - "5432:5432"
    volumes:
      - assetflow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assetflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  assetflow_pgdata:
